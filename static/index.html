<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYS // CONSULTA</title>
</head>
<body>

<h2>SYS // CONSULTA</h2>
<p>Status: <span id="status">Conectando...</span></p>
<p>Session: <span id="sess">--</span></p>

<hr>

<div id="msgs" style="height:400px;overflow-y:auto;border:1px solid #000;padding:10px;margin-bottom:10px;"></div>

<div id="typing" style="display:none;">
  <em>consultando telegram...</em>
</div>

<div id="auth-bar" style="display:none;background:#eee;padding:8px;margin-bottom:8px;">
  <strong id="auth-bar-txt">AGUARDANDO CÓDIGO</strong>
</div>

<div id="inp-mode-bar" style="display:none;margin-bottom:4px;">
  <strong id="inp-mode-txt">MODO AUTENTICAÇÃO</strong>
</div>

<input
  id="inp"
  type="text"
  placeholder="Digite um comando: /placa /nome /cpf"
  style="width:70%;padding:6px;"
  autocomplete="off"
  autocorrect="off"
  spellcheck="false"
>
<button id="sbtn" style="padding:6px 12px;">Enviar</button>

<br><br>
<small>Atalhos: </small>
<button onclick="setHint('/placa ')">/placa</button>
<button onclick="setHint('/nome ')">/nome</button>
<button onclick="setHint('/cpf ')">/cpf</button>

<hr>

<h3>OUTPUT</h3>
<div id="out-empty">Aguardando consulta...</div>
<div id="out-auth" style="display:none;">
  <p><strong>AUTENTICAÇÃO</strong></p>
  <p id="auth-desc">Verificação necessária</p>
  <p id="st1">[ ] Enviar código SMS</p>
  <p id="st2">[ ] Verificar código</p>
  <p id="st3">[ ] Sessão salva</p>
</div>
<div id="out-data" style="display:none;">
  <p><strong id="data-badge">RESULTADO</strong></p>
  <div id="data-fields"></div>
  <p><small id="data-ts"></small></p>
</div>

<script>
'use strict';

var msgsEl   = document.getElementById('msgs');
var inp      = document.getElementById('inp');
var sbtn     = document.getElementById('sbtn');
var typingEl = document.getElementById('typing');
var statusEl = document.getElementById('status');
var sessEl   = document.getElementById('sess');
var authBar  = document.getElementById('auth-bar');
var authBarTxt = document.getElementById('auth-bar-txt');
var inpMBar  = document.getElementById('inp-mode-bar');
var inpMTxt  = document.getElementById('inp-mode-txt');
var oEmpty   = document.getElementById('out-empty');
var oAuth    = document.getElementById('out-auth');
var oData    = document.getElementById('out-data');
var dFields  = document.getElementById('data-fields');
var dBadge   = document.getElementById('data-badge');
var dTs      = document.getElementById('data-ts');
var authDesc = document.getElementById('auth-desc');
var st1      = document.getElementById('st1');
var st2      = document.getElementById('st2');
var st3      = document.getElementById('st3');

var authMode    = null;
var authStarted = false;
var busy        = false;
var SESSION     = Math.random().toString(36).slice(2,8).toUpperCase();
sessEl.textContent = SESSION;

function sleep(ms){ return new Promise(function(r){ setTimeout(r,ms); }); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function scrollEnd(){ msgsEl.scrollTop = msgsEl.scrollHeight; }

function setHint(v){ inp.value = v; inp.focus(); }

function setStatus(text){ statusEl.textContent = text; }

function showBanner(text){ authBarTxt.textContent = text; authBar.style.display = 'block'; }
function hideBanner(){ authBar.style.display = 'none'; }

function unlock(){
  busy = false; authMode = null;
  inp.disabled = false; sbtn.disabled = false;
  inp.type = 'text';
  inp.placeholder = 'Digite um comando: /placa /nome /cpf';
  inpMBar.style.display = 'none';
  inp.focus();
}

function lock(){ inp.disabled = true; sbtn.disabled = true; }

function setMode(mode){
  authMode = mode;
  if(mode === 'code'){
    inp.type = 'text';
    inp.placeholder = 'Digite o código recebido no Telegram...';
    inpMTxt.textContent = 'MODO AUTENTICAÇÃO — CÓDIGO SMS';
    inpMBar.style.display = 'block';
    inp.disabled = false; sbtn.disabled = false;
    inp.focus();
  } else if(mode === '2fa'){
    inp.type = 'password';
    inp.placeholder = 'Digite sua senha de verificação...';
    inpMTxt.textContent = 'MODO AUTENTICAÇÃO — SENHA 2FA';
    inpMBar.style.display = 'block';
    inp.disabled = false; sbtn.disabled = false;
    inp.focus();
  } else {
    unlock();
  }
}

function showEmpty(){ oEmpty.style.display='block'; oAuth.style.display='none'; oData.style.display='none'; }

function showOutAuth(step){
  oEmpty.style.display='none'; oData.style.display='none'; oAuth.style.display='block';
  st1.textContent='[ ] Enviar código SMS';
  st2.textContent='[ ] Verificar código';
  st3.textContent='[ ] Sessão salva';
  if(step==='code'){ authDesc.textContent='Insira o código SMS do Telegram'; st1.textContent='[*] Enviar código SMS'; }
  else if(step==='2fa'){ authDesc.textContent='Verificação em dois fatores'; st1.textContent='[✓] Enviar código SMS'; st2.textContent='[*] Verificar código'; }
  else if(step==='done'){ authDesc.textContent='Sessão salva!'; st1.textContent='[✓] Enviar código SMS'; st2.textContent='[✓] Verificar código'; st3.textContent='[✓] Sessão salva'; }
}

function showResult(data, label){
  oEmpty.style.display='none'; oAuth.style.display='none'; oData.style.display='block';
  dBadge.textContent = label || 'RESULTADO';
  dFields.innerHTML = '';
  var fields = normalize(data);
  fields.forEach(function(f){
    var p = document.createElement('p');
    p.innerHTML = '<strong>' + esc(f.label) + '</strong><br>' + esc(f.value);
    dFields.appendChild(p);
    dFields.appendChild(document.createElement('hr'));
  });
  var now = new Date();
  dTs.textContent = now.toLocaleDateString('pt-BR') + ' ' + now.toLocaleTimeString('pt-BR');
}

function normalize(data){
  if(Array.isArray(data)) return data.map(function(x,i){ return { label:String(x.label||x.key||'CAMPO '+(i+1)).toUpperCase(), value:String(x.value!=null?x.value:'') }; });
  if(data&&typeof data==='object') return Object.keys(data).map(function(k){ return { label:k.replace(/_/g,' ').toUpperCase(), value:String(data[k]) }; });
  return [{label:'RESPOSTA',value:String(data)}];
}

function cmdType(cmd){
  if(/^\/placa/i.test(cmd)) return 'PLACA';
  if(/^\/cpf/i.test(cmd)) return 'CPF';
  if(/^\/nome/i.test(cmd)) return 'NOME';
  return 'CONSULTA';
}

function addMsg(text, role){
  var p = document.createElement('p');
  if(role==='user') p.innerHTML = '<strong>VOCÊ:</strong> ' + esc(text);
  else p.innerHTML = '<strong>SISTEMA:</strong> ' + esc(text);
  msgsEl.appendChild(p); scrollEnd();
  return p;
}

async function typeMsg(text, speed){
  speed = speed||12;
  var p = document.createElement('p');
  p.innerHTML = '<strong>SISTEMA:</strong> ';
  var span = document.createElement('span');
  p.appendChild(span); msgsEl.appendChild(p); scrollEnd();
  for(var i=0;i<text.length;i++){ span.textContent+=text[i]; scrollEnd(); await sleep(speed); }
}

function addAuthMsg(text){
  var p = document.createElement('p');
  p.innerHTML = '<strong>SISTEMA:</strong><br>' + esc(text).replace(/\n/g,'<br>');
  msgsEl.appendChild(p); scrollEnd();
}

function showTyping(t){ typingEl.querySelector('em').textContent = t||'consultando telegram...'; typingEl.style.display='block'; scrollEnd(); }
function hideTyping(){ typingEl.style.display='none'; }

async function startAuth(errMsg){
  authStarted=true; lock();
  setStatus('AUTH PENDENTE');
  showBanner('AGUARDANDO CÓDIGO SMS');
  showOutAuth('code');
  await sleep(300);
  addAuthMsg('Primeiro acesso detectado.\nUm código foi enviado para o seu Telegram.\n\nDigite o código abaixo:');
  if(errMsg) await typeMsg('⚠ '+errMsg, 11);
  setMode('code');
}

async function sendCode(code){
  lock(); showTyping('verificando código...');
  try{
    var r=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({step:'code',value:code})});
    var j=await r.json(); hideTyping();
    if(!r.ok||j.error){ await typeMsg('⚠ '+(j.error||'Erro.'),11); setMode('code'); return; }
    await typeMsg('Código enviado. Verificando...',13); await pollAuth();
  }catch(e){ hideTyping(); await typeMsg('Erro de conexão.',11); setMode('code'); }
}

async function send2FA(pw){
  lock(); showTyping('verificando senha...');
  try{
    var r=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({step:'2fa',value:pw})});
    var j=await r.json(); hideTyping();
    if(!r.ok||j.error){ await typeMsg('⚠ '+(j.error||'Senha incorreta.'),11); setMode('2fa'); return; }
    await typeMsg('Senha enviada. Verificando...',13); await pollAuth();
  }catch(e){ hideTyping(); await typeMsg('Erro de conexão.',11); setMode('2fa'); }
}

async function pollAuth(){
  for(var i=0;i<40;i++){
    await sleep(1500);
    try{
      var r=await fetch('/api/status'); var d=await r.json();
      if(d.telegram){ authStarted=false; hideBanner(); setStatus('TELEGRAM OK'); showOutAuth('done'); await sleep(1400); showEmpty(); await typeMsg('✅ Login realizado! Sessão salva.',11); unlock(); return; }
      if(d.auth_error){ await typeMsg('⚠ '+d.auth_error,11); unlock(); return; }
      if(d.auth_step==='2fa'){ showOutAuth('2fa'); showBanner('AGUARDANDO SENHA 2FA'); addAuthMsg('Conta com verificação em dois fatores.\nDigite sua senha do Telegram:'); setMode('2fa'); return; }
      if(d.auth_step==='code'){ await typeMsg('Código incorreto. Tente novamente:',11); showOutAuth('code'); setMode('code'); return; }
    }catch(e){}
  }
  await typeMsg('Tempo esgotado. Reinicie o servidor.',11); unlock();
}

async function checkStatus(){
  try{
    var r=await fetch('/api/status'); var d=await r.json();
    if(d.telegram){ setStatus('TELEGRAM OK'); hideBanner(); return; }
    if(d.needs_auth&&!authStarted){ await startAuth(d.auth_error); return; }
    if(d.auth_step==='2fa'&&!authStarted){ authStarted=true; showOutAuth('2fa'); showBanner('AGUARDANDO SENHA 2FA'); addAuthMsg('Verificação em dois fatores.\nDigite sua senha do Telegram:'); setMode('2fa'); return; }
    setStatus('Conectando...');
    setTimeout(checkStatus,3000);
  }catch(e){ setStatus('OFFLINE'); setTimeout(checkStatus,5000); }
}

async function doSend(){
  var text=inp.value.trim(); if(!text) return;
  if(authMode==='code'){ inp.value=''; addMsg('••••••','user'); await sendCode(text); return; }
  if(authMode==='2fa'){ inp.value=''; addMsg('••••••••','user'); await send2FA(text); return; }
  if(busy) return;
  busy=true; inp.value=''; lock(); addMsg(text,'user');
  try{
    await sleep(200); showTyping('consultando telegram...');
    var r=await fetch('/api/query',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:text,session_id:SESSION})});
    var j=await r.json(); await sleep(300); hideTyping();
    if(!r.ok||j.error) await typeMsg('⚠ '+(j.error||'Erro HTTP '+r.status),11);
    else{ await typeMsg(j.message||'Consulta realizada.',13); if(j.data) showResult(j.data,cmdType(text)); }
  }catch(e){ hideTyping(); await typeMsg('Falha de conexão.',11); setStatus('OFFLINE'); }
  finally{ unlock(); }
}

sbtn.addEventListener('click', doSend);
inp.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); doSend(); } });

checkStatus();
inp.focus();
</script>
</body>
</html>
